name: Pushback Verification

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify developer understanding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: arielbk/pushback/action@main
        # with:
        #   require-all-commits: 'false'  # default: only last commit needs verification
        #   fail-on-missing: 'true'       # default: fail the check if missing
